<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>New Chat</span>
                </button>
            </div>

            <div class="history-container">
                <h3 class="history-title">History</h3>
                <div id="history-list" class="history-list">
                    <!-- Chat history items will be added here -->
                </div>
            </div>

            <div class="sidebar-footer">
                <button id="clear-history-btn" class="sidebar-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    Clear History
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <div class="chat-wrapper">
            <header class="chat-header">
                <div class="header-content">
                    <h1 class="app-title">ChatBot Assistant</h1>
                </div>
                <button id="menu-toggle" class="menu-toggle">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
            </header>

            <div id="chat-box" class="chat-box">
                <!-- Messages will be added here dynamically -->
                <div class="welcome-screen">
                    <div class="welcome-icon">💬</div>
                    <h2>Welcome to ChatBot Assistant</h2>
                    <p>Start a conversation by typing a message below</p>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Ask me anything..." autocomplete="off">
                    <button id="send-btn" class="send-btn" title="Send message (Enter)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Press Enter to send</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
