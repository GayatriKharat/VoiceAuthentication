name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

# GitHub Pages needs these permissions on the workflow token
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. Don't cancel in-progress deploys —
# Pages doesn't like that mid-flight.
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # `npm install` (not `npm ci`) because lockfile was generated on
        # Windows and may miss Linux-only optional deps (e.g. @rollup/rollup-linux-x64-gnu).
        # `--legacy-peer-deps` because eslint@10 and eslint-plugin-react-hooks@7
        # have conflicting peer ranges; we don't actually run lint in CI so it's safe.
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build
        env:
          # Use the base path GitHub Pages told us about (e.g. /VoiceAuthentication/)
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}/
          # Optional: if you add a Gemini key as a repo secret named
          # GEMINI_API_KEY, it will be baked into the build. Safe to omit.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Add SPA fallback
        # Copy index.html to 404.html so client-side routes don't 404 on reload.
        run: cp dist/index.html dist/404.html

      - name: List dist contents (debug)
        run: ls -la dist && echo "---" && cat dist/index.html | head -40

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
