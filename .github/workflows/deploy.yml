name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

# GitHub Pages needs these permissions on the workflow token
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress run and the latest one.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        # Use `npm install` instead of `npm ci` because the lockfile was
        # generated on Windows and may be missing Linux-only optional deps
        # (e.g. @rollup/rollup-linux-x64-gnu), which makes `npm ci` fail.
        run: npm install --no-audit --no-fund

      - name: Build
        env:
          # Prefix for asset URLs. Must match the repo name with
          # leading + trailing slash, e.g. /voice-authentication-system/.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # Optional: if you add a Gemini key as a repo secret named
          # GEMINI_API_KEY, it will be baked into the build. Safe to omit.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Add SPA fallback
        # Copy index.html to 404.html so client-side routes don't 404 on reload.
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
